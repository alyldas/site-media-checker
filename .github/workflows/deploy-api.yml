name: Deploy API

on:
  workflow_dispatch:
    inputs:
      project:
        description: Deno Deploy project name
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deploy to Deno Deploy
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_ORG: ${{ vars.DENO_DEPLOY_ORG }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          deno deploy create \
            --org="${DENO_DEPLOY_ORG}" \
            --app="${{ inputs.project }}" \
            --source=local \
            --runtime-mode=dynamic \
            --entrypoint=apps/api/main.ts \
            --do-not-use-detected-build-config \
            --region=global \
            --no-wait || true

          deno deploy env add ALLOWED_ORIGINS "${ALLOWED_ORIGINS}" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}" ||
            deno deploy env update-value ALLOWED_ORIGINS "${ALLOWED_ORIGINS}" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}"
          deno deploy env add ALLOW_UNSAFE_DNS_FALLBACK "false" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}" ||
            deno deploy env update-value ALLOW_UNSAFE_DNS_FALLBACK "false" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}"
          deno deploy env add USER_AGENT "SiteMediaCheckerBot/1.0 (+https://github.com/alyldas/site-media-checker)" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}" ||
            deno deploy env update-value USER_AGENT "SiteMediaCheckerBot/1.0 (+https://github.com/alyldas/site-media-checker)" --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}"

          deno deploy --org="${DENO_DEPLOY_ORG}" --app="${{ inputs.project }}" --prod
