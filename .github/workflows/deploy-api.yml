name: Deploy API

on:
  workflow_dispatch:
    inputs:
      project:
        description: Deno Deploy project name
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deploy to Deno Deploy
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          deno run -A jsr:@deno/deployctl deploy \
            --project="${{ inputs.project }}" \
            --entrypoint=apps/api/main.ts \
            --prod \
            --env="ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --env="ALLOW_UNSAFE_DNS_FALLBACK=false" \
            --env="USER_AGENT=SiteMediaCheckerBot/1.0 (+https://github.com/alyldas/site-media-checker)"
